name: Build ProcInsight

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:39
      options: --user root

    steps:
      - name: Install dependencies
        run: |
          dnf install -y git curl java-17-openjdk-devel unzip which findutils \
            mesa-libGL mesa-libGL-devel libX11-devel libXrender-devel libXtst-devel \
            alsa-lib-devel cups-devel freetype-devel
          dnf clean all

      - name: Setup Java
        run: |
          java -version
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK
        run: |
          curl -sLo /tmp/cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q /tmp/cmdline-tools.zip -d /tmp/android-cmd
          mkdir -p /opt/android-sdk/cmdline-tools/latest
          mv /tmp/android-cmd/cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/
          rm -rf /tmp/cmdline-tools.zip /tmp/android-cmd
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/opt/android-sdk --licenses > /dev/null 2>&1 || true
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/opt/android-sdk \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" > /dev/null 2>&1

      - name: Setup Gradle wrapper
        run: |
          curl -sLo /tmp/gradle-wrapper.zip \
            "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper
          curl -sLo gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=/opt/android-sdk" > local.properties
          echo "org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC" >> local.properties

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/platform-tools
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ProcInsight-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Release APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/platform-tools
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
          ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ProcInsight-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
